version: '3.8'

services:
  synapse:
    # Pinned (no :latest) so the deployed version is deterministic. v1.106.0 is
    # the floor that fixes CVE-2024-37302/37303; BUMP to the current stable
    # release on a tracked cadence: https://github.com/element-hq/synapse/releases
    image: matrixdotorg/synapse:v1.106.0
    container_name: calliope-synapse
    restart: unless-stopped
    environment:
      - SYNAPSE_CONFIG_PATH=/data/homeserver.yaml
    volumes:
      - ./data:/data
    ports:
      # Bind to loopback only — nginx (on the host) proxies to localhost:8008 and
      # the backend reaches it over localhost. Publishing on 0.0.0.0 would expose
      # the FULL Synapse API, including /_synapse/admin, directly on every host
      # interface, bypassing the nginx allow/deny fence (account-takeover path).
      - "127.0.0.1:8008:8008"
    depends_on:
      synapse-db:
        condition: service_healthy
    networks:
      - calliope-matrix

  synapse-db:
    image: postgres:16-alpine
    container_name: calliope-synapse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${SYNAPSE_DB_PASSWORD}
      POSTGRES_DB: synapse
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - synapse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - calliope-matrix

networks:
  calliope-matrix:
    driver: bridge

volumes:
  synapse-db-data:
